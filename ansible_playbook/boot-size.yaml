---
- name: Collect /boot size from all servers
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Gather mount facts only
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - '!min'
          - mounts

    - name: Save /boot size in MB
      ansible.builtin.set_fact:
        boot_size_mb: >-
          {{
            (
              (
                ansible_facts.mounts
                | selectattr('mount', 'equalto', '/boot')
                | map(attribute='size_total')
                | list
                | first
                | default(0)
              ) / 1024 / 1024
            ) | round(0)
          }}

- name: Generate CSV report
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create CSV spreadsheet report
      ansible.builtin.template:
        src: boot_size_report.csv.j2
        dest: ./boot-size-report.csv

----

server_name,boot_size_mb
{% for host in groups['all'] -%}
{{ host }},{{ hostvars[host].boot_size_mb | default('NA') }}
{% endfor -%}
