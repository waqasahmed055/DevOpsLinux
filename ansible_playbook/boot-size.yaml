server_name,boot_size
{% for host in groups['all'] | sort -%}
{{ host }},{{ hostvars[host].boot_size | default('NA') }}
{% endfor -%}
---
- name: Collect /boot size from all servers
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Gather only mount facts
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - '!min'
          - mounts

    - name: Save /boot size as a fact
      ansible.builtin.set_fact:
        boot_size: >-
          {{
            (ansible_facts.mounts
             | selectattr('mount', 'equalto', '/boot')
             | map(attribute='size_total')
             | list
             | first)
            | default('NA', true)
          }}

- name: Create CSV report on controller
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Render CSV file
      ansible.builtin.template:
        src: boot_size_report.csv.j2
        dest: ./boot-size-report.csv
