- name: Collect disk and boot info from all servers
  hosts: all
  become: true
  gather_facts: false
  tasks:

    - name: Gather mount facts only
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - '!min'
          - mounts

    - name: Save /boot size in MB
      ansible.builtin.set_fact:
        boot_size_mb: >-
          {{
            (
              (
                ansible_facts.mounts
                | selectattr('mount', 'equalto', '/boot')
                | map(attribute='size_total')
                | list
                | first
                | default(0)
              ) / 1024 / 1024
            ) | round(0)
          }}

    - name: Print disk report directly on each host
      ansible.builtin.shell: |
        echo ""
        echo "============================================================"
        echo "HOST: $(hostname)"
        echo "============================================================"
        echo ""
        echo "/boot size: {{ boot_size_mb }} MB"
        echo ""
        echo "--- Partition Usage (df) ---"
        df -Ph
        echo ""
        echo "--- Block Devices (lsblk) ---"
        lsblk -o NAME,TYPE,SIZE,FSTYPE,MOUNTPOINT | grep -v loop
        echo ""
        echo "============================================================"
      register: report_output
      changed_when: false

    - name: Show report output
      ansible.builtin.debug:
        msg: "{{ report_output.stdout_lines }}"
