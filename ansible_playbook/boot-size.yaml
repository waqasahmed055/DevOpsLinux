- name: Collect disk and boot info from all servers
  hosts: all
  become: true
  gather_facts: false
  tasks:

    - name: Gather mount facts only
      ansible.builtin.setup:
        gather_subset:
          - '!all'
          - '!min'
          - mounts

    - name: Save /boot size in MB
      ansible.builtin.set_fact:
        boot_size_mb: >-
          {{
            (
              (
                ansible_facts.mounts
                | selectattr('mount', 'equalto', '/boot')
                | map(attribute='size_total')
                | list
                | first
                | default(0)
              ) / 1024 / 1024
            ) | round(0)
          }}

    - name: Get partition usage
      ansible.builtin.shell: |
        df -Ph | tail -n +2
      register: df_output
      changed_when: false

    - name: Get physical disks
      ansible.builtin.shell: |
        lsblk -o NAME,TYPE,SIZE,FSTYPE,MOUNTPOINT | grep -v loop
      register: lsblk_output
      changed_when: false

- name: Print disk report to screen
  hosts: localhost
  gather_facts: false
  tasks:

    - name: Display report for each host
      ansible.builtin.debug:
        msg: |
          ============================================================
          HOST: {{ item }}
          ============================================================

          /boot size: {{ hostvars[item].boot_size_mb | default('NA') }} MB

          --- Partition Usage (df) ---
          {{ hostvars[item].df_output.stdout }}

          --- Block Devices (lsblk) ---
          {{ hostvars[item].lsblk_output.stdout }}

          ============================================================
      loop: "{{ groups['all'] }}"
