---
- name: Copy and extract application archive
  hosts: all
  become: true
  gather_facts: false

  vars:
    zip_name: application.zip
    local_zip: "/tmp/{{ zip_name }}"
    remote_zip: "/tmp/{{ zip_name }}"
    extract_dir: "{{ remote_zip | splitext | first }}"

  tasks:
    - name: Ensure unzip is installed
      ansible.builtin.package:
        name: unzip
        state: present

    - name: Ensure extraction directory exists
      ansible.builtin.file:
        path: "{{ extract_dir }}"
        state: directory
        mode: "0755"

    - name: Copy archive to remote server
      ansible.builtin.copy:
        src: "{{ local_zip }}"
        dest: "{{ remote_zip }}"
        mode: "0644"
      notify: Extract archive

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

  handlers:
    - name: Extract archive
      ansible.builtin.unarchive:
        src: "{{ remote_zip }}"
        dest: "{{ extract_dir }}"
        remote_src: true
