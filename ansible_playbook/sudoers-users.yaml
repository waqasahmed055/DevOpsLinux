---
# Single-file sudo audit -> Excel report.
# Everything is embedded here - no external .j2 template or .py script needed.
#
# Usage:
#   ansible-playbook -i inventory sudoers_audit_excel_single.yml
#
# Output:
#   ./sudoers_audit_reports/json/<host>.json        (intermediate, one per host)
#   ./sudoers_audit_reports/sudo_audit_report.xlsx   (final Excel report)

- name: Audit sudo users and groups on Linux servers
  hosts: linux_servers
  become: true
  gather_facts: true

  vars:
    local_report_dir: "./sudoers_audit_reports"
    local_json_dir: "{{ local_report_dir }}/json"

  tasks:

    - name: Create local report/json directories
      delegate_to: localhost
      become: false
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ local_report_dir }}"
        - "{{ local_json_dir }}"
      run_once: true

    #################################################################
    # Direct user sudo entries
    #################################################################

    - name: Find direct user sudo entries
      shell: |
        grep -hvE '^(#|$|Defaults|User_Alias|Runas_Alias|Host_Alias|Cmnd_Alias|%|@include|#include)' \
        /etc/sudoers /etc/sudoers.d/* 2>/dev/null \
        | awk '{print $1}' \
        | sort -u
      args:
        executable: /bin/bash
      register: sudo_users
      changed_when: false

    #################################################################
    # Sudo groups
    #################################################################

    - name: Find sudo groups
      shell: |
        grep -hE '^%' /etc/sudoers /etc/sudoers.d/* 2>/dev/null \
        | awk '{print $1}' \
        | sed 's/^%//' \
        | sort -u
      args:
        executable: /bin/bash
      register: sudo_groups
      changed_when: false

    #################################################################
    # Expand group membership (one getent call per group, in order,
    # so results line up with sudo_groups.stdout_lines by index)
    #################################################################

    - name: Get members of each sudo group
      shell: |
        getent group "{{ item }}" | awk -F: '{print $4}'
      args:
        executable: /bin/bash
      loop: "{{ sudo_groups.stdout_lines }}"
      register: group_members_raw
      changed_when: false
      failed_when: false
      when: sudo_groups.stdout != ""

    #################################################################
    # Write structured per-host JSON (inline content - no external
    # .j2 template file needed)
    #################################################################

    - name: Write per-host JSON data file
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ local_json_dir }}/{{ inventory_hostname }}.json"
        mode: "0644"
        content: |
          {
            "hostname": "{{ ansible_hostname }}",
            "fqdn": "{{ ansible_fqdn }}",
            "inventory_hostname": "{{ inventory_hostname }}",
            "environment": "{{ group_names | join(', ') }}",
            "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
            "direct_users": {{ sudo_users.stdout_lines | default([]) | to_json }},
            "sudo_groups": [
          {% for result in group_members_raw.results | default([]) %}
              {
                "name": "{{ result.item }}",
                "members": {{ (result.stdout | default('')).split(',') | map('trim') | reject('equalto', '') | list | to_json }}
              }{{ "," if not loop.last else "" }}
          {% endfor %}
            ]
          }

    #################################################################
    # Summary
    #################################################################

    - name: Print summary
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Direct Users: {{ sudo_users.stdout_lines | default([]) }}"
          - "Sudo Groups: {{ sudo_groups.stdout_lines | default([]) }}"

#################################################################
# Final play: write out the Excel-builder script, run it, clean up.
# No external .py file needed - the script is embedded below.
#################################################################

- name: Generate consolidated Excel report
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  vars:
    local_report_dir: "./sudoers_audit_reports"
    local_json_dir: "{{ local_report_dir }}/json"
    excel_output_file: "{{ local_report_dir }}/sudo_audit_report.xlsx"
    excel_script_path: "{{ local_report_dir }}/.generate_excel_report.py"

  tasks:

    - name: Ensure local report/json directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ local_report_dir }}"
        - "{{ local_json_dir }}"

    - name: Ensure openpyxl is available on the control node
      pip:
        name: openpyxl
        state: present
      ignore_errors: true

    - name: Check whether any per-host JSON files were produced
      find:
        paths: "{{ local_json_dir }}"
        patterns: "*.json"
      register: found_json_files

    - name: Fail early with a clear message if no host data was collected
      fail:
        msg: >-
          No per-host JSON files found in {{ local_json_dir }}.
          This means the first play (hosts: linux_servers) matched zero hosts -
          check that 'linux_servers' is a real group in your inventory
          (run 'ansible-inventory --graph' to see actual group names),
          and update 'hosts: linux_servers' in this playbook to match if needed.
      when: found_json_files.matched == 0

    - name: Write the embedded Excel-builder script
      copy:
        dest: "{{ excel_script_path }}"
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import json
          import sys
          from pathlib import Path
          from openpyxl import Workbook
          from openpyxl.styles import Font, PatternFill, Alignment
          from openpyxl.utils import get_column_letter


          def load_host_data(json_dir):
              hosts = []
              json_path = Path(json_dir)
              if not json_path.exists():
                  raise FileNotFoundError(f"JSON directory not found: {json_dir}")
              for json_file in sorted(json_path.glob("*.json")):
                  try:
                      with open(json_file, "r") as f:
                          hosts.append(json.load(f))
                  except (json.JSONDecodeError, OSError) as exc:
                      print(f"WARNING: skipping {json_file.name}: {exc}", file=sys.stderr)
              return hosts


          def style_header(ws, row=1):
              header_fill = PatternFill(start_color="305496", end_color="305496", fill_type="solid")
              header_font = Font(bold=True, color="FFFFFF")
              for cell in ws[row]:
                  cell.fill = header_fill
                  cell.font = header_font
                  cell.alignment = Alignment(horizontal="left", vertical="center")
              ws.freeze_panes = "A2"


          def autosize_columns(ws):
              for col_cells in ws.columns:
                  length = max((len(str(cell.value)) if cell.value is not None else 0) for cell in col_cells)
                  col_letter = get_column_letter(col_cells[0].column)
                  ws.column_dimensions[col_letter].width = min(max(length + 2, 12), 60)


          def build_workbook(hosts, output_file):
              if not hosts:
                  raise ValueError("No host JSON data found - nothing to write.")

              wb = Workbook()

              ws_users = wb.active
              ws_users.title = "Direct Users"
              ws_users.append(["Hostname", "Environment", "OS", "Sudo User"])
              for host in hosts:
                  users = host.get("direct_users") or []
                  if not users:
                      ws_users.append([host["hostname"], host["environment"], host["os"], "(none)"])
                  for user in users:
                      ws_users.append([host["hostname"], host["environment"], host["os"], user])
              style_header(ws_users)
              autosize_columns(ws_users)

              ws_groups = wb.create_sheet("Sudo Groups")
              ws_groups.append(["Hostname", "Environment", "OS", "Sudo Group", "Group Members"])
              for host in hosts:
                  groups = host.get("sudo_groups") or []
                  if not groups:
                      ws_groups.append([host["hostname"], host["environment"], host["os"], "(none)", ""])
                  for group in groups:
                      members = ", ".join(group.get("members") or [])
                      ws_groups.append([
                          host["hostname"], host["environment"], host["os"],
                          group.get("name", ""), members or "(no members)",
                      ])
              style_header(ws_groups)
              autosize_columns(ws_groups)

              ws_summary = wb.create_sheet("Summary")
              ws_summary.append(["Hostname", "Environment", "OS", "# Direct Users", "# Sudo Groups"])
              for host in hosts:
                  ws_summary.append([
                      host["hostname"], host["environment"], host["os"],
                      len(host.get("direct_users") or []), len(host.get("sudo_groups") or []),
                  ])
              style_header(ws_summary)
              autosize_columns(ws_summary)

              wb.save(output_file)
              print(f"Excel report written to: {output_file}")
              print(f"Hosts processed: {len(hosts)}")


          def main():
              if len(sys.argv) != 3:
                  print("Usage: script.py <json_dir> <output_xlsx>", file=sys.stderr)
                  sys.exit(1)
              hosts = load_host_data(sys.argv[1])
              build_workbook(hosts, sys.argv[2])


          if __name__ == "__main__":
              main()

    - name: Build Excel workbook from per-host JSON files
      command: "python3 {{ excel_script_path }} {{ local_json_dir }} {{ excel_output_file }}"
      register: excel_build
      changed_when: true

    - name: Show Excel build result
      debug:
        var: excel_build.stdout_lines

    - name: Clean up the temporary Excel-builder script
      file:
        path: "{{ excel_script_path }}"
        state: absent
