# =============================================================================
# Playbook : check_os_version.yml
# Purpose  : Find Oracle Linux 7.x and RHEL 7.x hosts and generate a report
# Output   : /tmp/ansible_os_report/os_report.txt
#
# Usage:
#   ansible-playbook check_os_version.yml -i inventory.ini
# =============================================================================

# -----------------------------------------------------------------------------
# PLAY 1 - Gather OS facts from all hosts
# -----------------------------------------------------------------------------
- name: Gather OS facts
  hosts: all
  gather_facts: true

  tasks:

    - name: Build host OS information
      ansible.builtin.set_fact:
        os_info:
          hostname: "{{ ansible_hostname | default(inventory_hostname) }}"
          ip: "{{ ansible_default_ipv4.address | default(ansible_host | default('N/A')) }}"
          os_label: >-
            {% if ansible_distribution | lower in ['oraclelinux', 'oraclelinuxserver', 'oracleserver'] %}
            Oracle Linux {{ ansible_distribution_version }}
            {% elif ansible_distribution | lower in ['redhat', 'red hat enterprise linux'] %}
            RHEL {{ ansible_distribution_version }}
            {% else %}
            {{ ansible_distribution }} {{ ansible_distribution_version }}
            {% endif %}

    - name: Mark supported 7.x systems
      ansible.builtin.set_fact:
        is_target: >-
          {{
            (
              ansible_distribution | lower
            ) in [
              'oraclelinux',
              'oraclelinuxserver',
              'oracleserver',
              'redhat',
              'red hat enterprise linux'
            ]
            and ansible_distribution_major_version == '7'
          }}

# -----------------------------------------------------------------------------
# PLAY 2 - Generate report on localhost
# -----------------------------------------------------------------------------
- name: Generate OS report
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    report_dir: "/tmp/ansible_os_report"
    report_file: "{{ report_dir }}/os_report.txt"

  tasks:

    - name: Create report directory
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: "0755"

    - name: Collect matched hosts
      ansible.builtin.set_fact:
        matched_hosts: >-
          {{
            groups['all']
            | map('extract', hostvars)
            | selectattr('is_target', 'defined')
            | selectattr('is_target', 'equalto', true)
            | map(attribute='os_info')
            | sort(attribute='hostname')
            | list
          }}

    - name: Initialize report lines
      ansible.builtin.set_fact:
        report_lines:
          - "=================================================================="
          - "OS Inventory Report -- Oracle Linux 7.x / RHEL 7.x"
          - "Generated : {{ lookup('pipe', 'date \"+%Y-%m-%d %H:%M:%S\"') }}"
          - "=================================================================="

    - name: Add message if no hosts matched
      ansible.builtin.set_fact:
        report_lines: "{{ report_lines + ['No matching hosts found.'] }}"
      when: matched_hosts | length == 0

    - name: Add report table header
      ansible.builtin.set_fact:
        report_lines: >-
          {{
            report_lines
            + [
                '%-32s %-18s %s' | format('Hostname', 'IP Address', 'OS / Version'),
                '------------------------------------------------------------------'
              ]
          }}
      when: matched_hosts | length > 0

    - name: Add matching hosts to report
      ansible.builtin.set_fact:
        report_lines: >-
          {{
            report_lines
            + [
                '%-32s %-18s %s'
                | format(item.hostname, item.ip, item.os_label | trim)
              ]
          }}
      loop: "{{ matched_hosts }}"
      when: matched_hosts | length > 0

    - name: Add report footer
      ansible.builtin.set_fact:
        report_lines: >-
          {{
            report_lines
            + [
                '------------------------------------------------------------------',
                'Total matched hosts : ' ~ (matched_hosts | length | string),
                '=================================================================='
              ]
          }}

    - name: Write report to file
      ansible.builtin.copy:
        dest: "{{ report_file }}"
        content: "{{ report_lines | join('\n') }}\n"
        mode: "0644"

    - name: Print report to console
      ansible.builtin.debug:
        msg: "{{ report_lines }}"

    - name: Show report location
      ansible.builtin.debug:
        msg: "Report written to: {{ report_file }}"
