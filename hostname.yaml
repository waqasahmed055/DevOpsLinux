---
- name: Collect hostname, IP, and OS version from all hosts
  hosts: all
  gather_facts: true

  tasks:

    - name: Print info per host (visual check)
      debug:
        msg: "Host: {{ ansible_hostname }} | IP: {{ ansible_default_ipv4.address }} | OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

- name: Write results to CSV on control node
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Generate CSV file from collected facts
      copy:
        dest: "{{ playbook_dir }}/server_inventory_report.csv"
        content: |
          hostname,ip_address,os_version
          {% for host in groups['all'] %}
          {{ hostvars[host]['ansible_hostname'] }},{{ hostvars[host]['ansible_default_ipv4']['address'] }},{{ hostvars[host]['ansible_distribution'] }} {{ hostvars[host]['ansible_distribution_version'] }}
          {% endfor %}
