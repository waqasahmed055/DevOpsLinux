---
- name: Collect hostname, IP, and OS version from all hosts
  hosts: all
  gather_facts: true

  tasks:

    - name: Print info per host (optional visual check)
      debug:
        msg: "Host: {{ ansible_hostname }} | IP: {{ ansible_default_ipv4.address }} | OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"

- name: Write results to CSV on control node
  hosts: localhost
  gather_facts: false

  tasks:

    - name: Create CSV file with header
      copy:
        content: "hostname,ip_address,os_version\n"
        dest: ./server_inventory_report.csv

    - name: Append each host's data to CSV
      lineinfile:
        path: ./server_inventory_report.csv
        line: "{{ hostvars[item]['ansible_hostname'] }},{{ hostvars[item]['ansible_default_ipv4']['address'] }},{{ hostvars[item]['ansible_distribution'] }} {{ hostvars[item]['ansible_distribution_version'] }}"
        insertafter: EOF
      loop: "{{ groups['all'] }}"
